# yaml-language-server: $schema=./cle-config.schema.json
#
# Drop a copy of cle's published JSON schema at the path above (or
# remove this line) so VSCode autocompletes fields. The schema lives
# in the cle repo at cle_cli/cle_cli/schemas/cle-config.schema.json.

version: 1

packs:
  - asvs-l2

# The verifier reads `context` as a Markdown briefing and lets it
# inform applicability decisions ("no MFA isn't a gap — it's out of
# scope by design"). Be honest about what the app is and isn't;
# inflated context produces inflated findings.
context: |
  ## Stack

  - Backend: Node 20 + TypeScript + Fastify + Prisma + SQLite
  - Frontend: Vue 3 + Vite + Pinia + Vue Router
  - pnpm workspaces (apps/api, apps/web, packages/types)
  - SQLite is in-process; no database server
  - File uploads stored on local disk under uploads/, served via API with per-request access checks

  ## Authentication and sessions

  Local signup with email + password. Argon2id for password hashing. Sessions are signed httpOnly sameSite=lax cookies, DB-backed.

  ## Rendering

  Note bodies and user bios are markdown, rendered client-side via marked + DOMPurify → v-html.

  ## Roles

  Two roles: regular user and admin. Admin is seedable via env; no self-service admin promotion.

requirements:
  exclude:
    # Already excluded — architecture genuinely lacks these
    - "V9.*" # Self-contained tokens (JWT) — session-based auth, no JWTs
    - "V10.*" # OAuth and OIDC — no federated auth flows
    - "V17.*" # WebRTC — not used

    # Architecture genuinely lacks these (continued)
    - "V4.2.*" # Load-balancer / firewall posture — handled at infrastructure, out of app's responsibility
    - "V4.3.*" # GraphQL — this is a REST/JSON API
    - "V4.4.*" # WebSocket — none used
    - "V6.4.*" # System-generated initial passwords / activation codes — self-signup; no admin-creates-user flow
    - "V6.5.*" # Look-up secrets / OOB / OTP — no MFA mechanism by design
    - "V6.6.*" # PSTN / SMS authentication — no SMS-based flows
    - "V6.8.*" # Multi-IdP — single auth pathway
    - "V7.6.*" # RP/IdP federation session lifetime — no federation
    - "V8.4.*" # Multi-tenant cross-tenant controls — single-tenant
    - "V12.3.*" # TLS for external outbound connections — no outbound HTTP from the API
    - "V13.2.*" # Inter-component authentication — single-app deployment, no internal-service mesh

    # Intentional architectural choice — risk accepted for small-startup posture
    - "V6.3.*" # Anti-automation / rate limiting — deferred. Argon2 cost + small attack surface is the current bar.
    - "V2.4.*" # Anti-automation against excessive calls — same rationale as V6.3.

    # Documentation requirements without a code-level fix path — demo doesn't carry the documentation regime
    - "V2.1.*" # Input-validation rules documentation
    - "V5.1.*" # File upload documentation
    - "V6.1.*" # Authentication controls documentation
    - "V8.1.*" # Authorization rules documentation
    - "V11.1.*" # Cryptographic key management policy
    - "V13.1.*" # Communication needs documentation
    - "V14.1.*" # Sensitive data classification policy
    - "V15.1.*" # Third-party vulnerability remediation timeframes
    - "V16.1.*" # Logging inventory documentation

agent:
  #model: openai:moonshotai/Kimi-K2.6 # Infomaniak
  #model: ollama:kimi-k2.6:cloud # Ollama Cloud
  #model: ollama:gemma4:31b-cloud # Ollama Cloud
  model: anthropic:claude-opus-4-7
  max_concurrency: 10
  timeout_seconds: 60000
  thinking: true

output:
  default_reporter: pretty

observability:
  # Only a demo repo - nothing sensitive
  dangerously_disable_log_scrubbing: true
