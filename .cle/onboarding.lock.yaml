open_questions:
- id: are-security-related-http-headers-e-g-st
  question: Are security-related HTTP headers (e.g., Strict-Transport-Security, Content-Security-Policy,
    X-Content-Type-Options, Referrer-Policy) set at the infrastructure/reverse-proxy
    layer rather than in the application code?
  why: No security headers are set in the Fastify application code (no helmet, no
    CSP, no HSTS, no X-Content-Type-Options). If they are set outside the app, the
    verifier needs to know.
  affects:
  - V3.3.1
  - V3.3.2
  - V3.3.3
  - V3.3.4
  - V3.4.1
  - V3.4.2
  - V3.4.3
  - V3.4.4
  - V3.4.5
  - V3.4.6
  status: answered
  answer: No — not set anywhere
  choices:
  - label: Yes — set at infrastructure layer
    description: The managed platform or reverse proxy injects security headers (HSTS,
      CSP, etc.) before responses reach clients.
  - label: No — not set anywhere
    description: Security headers are not configured either in the application or
      at the infrastructure layer.
  - label: Partially — some set at infra
    description: Some security headers are set at the infra layer; others are not
      set at all.
- id: is-the-api-deployed-behind-a-tls-termina
  question: Is the API deployed behind a TLS-terminating reverse proxy (e.g., Nginx,
    Caddy, AWS ALB) that handles HTTPS, or does the app itself handle TLS termination?
  why: The Fastify server listens on plain HTTP (0.0.0.0:3000) with no TLS configuration
    in code; the `secure` cookie flag is only set when NODE_ENV=production, but there
    is no in-app TLS setup.
  affects:
  - V3.3.1
  - V3.4.1
  - V12.2.1
  - V12.2.2
  - V12.3.1
  - V12.3.2
  - V12.3.3
  - V12.3.4
  - V3.3.3
  - V4.1.2
  status: answered
  answer: Yes — managed platform TLS
  choices:
  - label: Yes — generic reverse proxy
    description: Caddy, Nginx, HAProxy, AWS ALB or similar terminating TLS in front
      of the app.
  - label: Yes — managed platform TLS
    description: Heroku, Render, Fly.io, AWS ECS/Fargate with managed TLS, or similar
      PaaS that provides HTTPS.
  - label: No — app handles TLS itself
    description: The application is configured to listen on HTTPS directly (e.g.,
      via Fastify HTTPS options or a sidecar).
- id: is-the-application-deployed-behind-any-w
  question: Is the application deployed behind any WAF, API gateway, or similar infrastructure
    that provides rate limiting or anti-automation protections?
  why: The codebase has no rate limiting, account lockout, or anti-automation controls
    in the Fastify routes or middleware.", "V6.3.1", "V6.1.1", "V2.4.1", "V15.2.2
  affects:
  - V2.4.1
  - V6.1.1
  - V6.3.1
  - V15.2.2
  status: answered
  answer: It has IP allowlisting
  choices:
  - label: Yes — WAF/API gateway
    description: Cloudflare, AWS WAF, Kong or similar providing rate limiting or bot
      protection in front of the app.
  - label: No — no external protection
    description: Rate limiting, anti-automation, and DDoS protection are left entirely
      to the application layer.
- id: is-the-application-single-tenant-one-dep
  question: Is the application single-tenant (one deployment serves one organization)
    or multi-tenant (one deployment serves multiple organizations with data isolation)?
  why: The database schema has a simple role-based access model with no tenant identifier;
    notes use ownerId and sharing but there is no explicit tenant boundary in the
    schema.
  affects:
  - V8.4.1
  status: answered
  answer: Single-tenant
  choices:
  - label: Single-tenant
    description: One deployment serves one customer/organization; no tenant data isolation
      needed.
  - label: Multi-tenant
    description: One deployment serves multiple organizations with data isolation
      enforced at the application or database level (e.g., tenant ID column, separate
      schemas).
