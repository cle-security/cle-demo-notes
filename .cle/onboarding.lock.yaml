open_questions:
- id: are-there-any-secrets-management-tools-e
  question: Are there any secrets management tools (e.g., HashiCorp Vault, AWS Secrets
    Manager, environment-variable injection via orchestration) used to inject SESSION_SECRET
    or other credentials in production, or are secrets stored directly in environment
    files?
  why: The .env.example file shows SESSION_SECRET and DATABASE_URL as environment
    variables, but the code doesn't reference a secrets manager. V13.3.1 requires
    a secrets management solution.
  affects:
  - V13.3.1
  - V13.3.2
  status: open
  answer: null
- id: are-there-any-waf-rate-limiting-or-anti
  question: Are there any WAF, rate-limiting, or anti-automation tools in front of
    this application in production (e.g., Cloudflare, AWS WAF, Nginx rate limiting)?
  why: The code has no rate limiting, CSRF tokens, or anti-automation controls. V2.4.1
    and V6.3.1 require these controls.
  affects:
  - V2.4.1
  - V6.3.1
  status: answered
  answer: nothing
- id: in-production-is-the-app-deployed-behind
  question: In production, is the app deployed behind a TLS-terminating reverse proxy
    (e.g., Nginx, Caddy, AWS ALB) that handles HTTPS, or does the app itself handle
    TLS?
  why: The application code only listens on plain HTTP (Fastify on port 3000) with
    no TLS configuration in the source code. Requirements V12.x about TLS depend on
    where termination occurs.
  affects:
  - V12.1.1
  - V12.1.2
  - V12.2.1
  - V12.2.2
  - V12.3.1
  - V12.3.2
  - V12.3.3
  - V12.3.4
  status: answered
  answer: It's behind a TLS-terminating reverse proxy
- id: is-there-any-antivirus-or-malware-scanni
  question: Is there any antivirus or malware scanning of uploaded files in the production
    environment (e.g., ClamAV on the server, WAF-level scanning, or cloud-provider
    scanning)?
  why: The code does not scan uploaded files for malware; it only validates MIME type
    and size. V5.4.3 requires antivirus scanning of files from untrusted sources.
  affects:
  - V5.4.3
  status: answered
  answer: nothing
- id: is-there-any-log-aggregation-siem-or-cen
  question: Is there any log aggregation, SIEM, or centralized logging system that
    receives application logs in production?
  why: The application uses Fastify's built-in logger (console/stdout). V16.4.3 requires
    logs to be transmitted to a separate system.
  affects:
  - V16.2.3
  - V16.4.3
  status: answered
  answer: 'no'
- id: is-this-application-single-tenant-one-de
  question: Is this application single-tenant (one deployment serves one organization)
    or multi-tenant (multiple customer organizations share the same deployment)?
  why: The codebase has no tenant model or tenant isolation logic, suggesting single-tenant.
    V8.4.1 about cross-tenant controls depends on this.
  affects:
  - V8.4.1
  status: answered
  answer: single tenant
