open_questions:
- id: is-the-api-deployed-behind-a-tls-termina
  question: Is the API deployed behind a TLS-terminating reverse proxy (e.g., Nginx,
    Caddy, HAProxy, or cloud load balancer) in production, so that HTTPS is provided
    upstream even though the Node app itself listens on plain HTTP?
  why: The API server binds to 0.0.0.0:3000 with no TLS configuration in code.
  affects:
  - V12.2.1
  - V12.2.2
  - V3.4.1
  - V4.1.2
  status: answered
  answer: Yes — TLS terminates at a reverse proxy
  choices:
  - label: Yes — TLS terminates at a reverse proxy
    description: Caddy, Nginx, HAProxy, cloud LB or similar handles HTTPS in front
      of the app.
  - label: No — the app handles TLS itself or is not yet deployed
    description: There is no upstream TLS terminator; the app either handles TLS directly
      or there is no production deployment yet.
- id: is-there-any-rate-limiting-waf-or-simila
  question: Is there any rate limiting, WAF, or similar anti-automation control in
    front of the application (e.g., at the reverse proxy, CDN, or API gateway layer),
    or is this something the application needs to handle itself?
  why: No rate-limiting middleware or WAF configuration was found in the codebase.
  affects:
  - V2.4.1
  - V6.1.1
  - V6.3.1
  status: answered
  answer: No — no external rate limiting
  choices:
  - label: Yes — infrastructure provides rate limiting
    description: A reverse proxy, CDN, or API gateway provides rate limiting or WAF
      rules before traffic reaches the app.
  - label: No — no external rate limiting
    description: There is no external anti-automation control; the app is responsible
      for anything it needs.
