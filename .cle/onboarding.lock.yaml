- requirement: V1.4.1
  reason: No C/C++ native code, unsafe pointer arithmetic, or manual memory management
    found. The application is written in TypeScript running on Node.js/V8, which provides
    memory safety (bounds-checked strings and buffers). The requirement targets low-level
    stack/buffer/heap overflow prevention in unmanaged code.
  source: agent
- requirement: V1.4.3
  reason: No manual memory allocation/deallocation or pointer management. The application
    runs on Node.js (V8 garbage-collected runtime) — memory is released automatically,
